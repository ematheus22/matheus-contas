<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FINANÇAS 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--sur:#161921;--sur2:#1a1f2e;
  --bd:#1f2333;--bd2:#2e3347;
  --tx:#e8eaf0;--mu:#8892a4;--fa:#4a5168;
  --g:#4ade80;--gbg:rgba(74,222,128,0.1);--gbd:rgba(74,222,128,0.3);
  --r:#f87171;--rbg:rgba(248,113,113,0.1);--rbd:rgba(248,113,113,0.3);
  --y:#fbbf24;--sh:0 4px 24px rgba(0,0,0,0.35);
}
.lt{
  --bg:#f0f4f8;--sur:#fff;--sur2:#eef2f7;
  --bd:#dde3ec;--bd2:#c8d0dc;
  --tx:#1a2035;--mu:#4a5878;--fa:#8896aa;
  --g:#16a34a;--gbg:rgba(22,163,74,0.08);--gbd:rgba(22,163,74,0.25);
  --r:#dc2626;--rbg:rgba(220,38,38,0.07);--rbd:rgba(220,38,38,0.25);
  --y:#b45309;--sh:0 4px 24px rgba(0,0,0,0.07);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
input,select{background:var(--sur2);border:1px solid var(--bd2);border-radius:8px;padding:8px 11px;color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border .15s}
input:focus,select:focus{border-color:var(--g)!important}
button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer}
.card{background:var(--sur);border:1px solid var(--bd);border-radius:16px;padding:22px;box-shadow:var(--sh);transition:background .3s,border .3s}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fu .22s ease}

/* NAV */
#nav{position:sticky;top:0;z-index:100;background:rgba(22,25,33,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);transition:background .3s,border .3s}
.lt #nav{background:rgba(255,255,255,.96)}
.ni{max-width:1060px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#4ade80,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .3s}
.lt .logo-ic{background:linear-gradient(135deg,#16a34a,#0891b2)}
.logo-t{font-size:15px;font-weight:800;letter-spacing:2px;text-transform:uppercase;line-height:1}
.logo-s{font-size:10px;color:var(--fa);margin-top:2px}
.nav-r{display:flex;gap:10px;align-items:center}
.btn-th{background:var(--sur2);border:1px solid var(--bd);color:var(--tx);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;transition:all .2s}
.btn-sw{background:none;border:1px solid var(--bd);color:var(--fa);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;transition:all .15s}
.btn-sw:hover{border-color:var(--r);color:var(--r)}

/* MAIN */
#main{max-width:1060px;margin:0 auto;padding:28px 24px}

/* MONTH TABS */
.mtabs-wrap{overflow-x:auto;margin-bottom:28px;padding-bottom:2px}
.mtabs{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:5px;display:inline-flex;gap:3px;min-width:max-content;box-shadow:var(--sh)}
.mtab{padding:7px 14px;border-radius:10px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--fa);white-space:nowrap;transition:all .18s}
.mtab.has{color:var(--tx)}
.mtab.on{background:var(--g);color:#0d0f14}
.lt .mtab.on{color:#fff}
.mtab .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--g);margin-left:5px;vertical-align:middle}
.tsep{width:1px;background:var(--bd);margin:4px 4px}
.ytab{padding:7px 16px;border-radius:10px;font-size:12px;font-weight:700;border:none;background:transparent;color:var(--y);white-space:nowrap;transition:all .18s}
.ytab.on{background:var(--y);color:#0d0f14}

/* SUMMARY GRID */
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:28px}

/* SALDO */
.scard{background:linear-gradient(145deg,#161921,#1a2440);border:1px solid #2a3a60!important;position:relative;overflow:hidden}
.lt .scard{background:var(--sur)!important;border:1px solid var(--bd)!important}
.sglow{position:absolute;top:-24px;right:-24px;width:110px;height:110px;border-radius:50%;opacity:.07;pointer-events:none}
.slbl{font-size:10px;letter-spacing:2.5px;color:var(--fa);text-transform:uppercase;margin-bottom:10px;font-weight:600}
.sval{font-size:30px;font-weight:800;line-height:1;transition:color .3s}
.smg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.smb{border-radius:12px;padding:10px 12px}
.smb.g{background:var(--gbg);border:1px solid var(--gbd)}
.smb.r{background:var(--rbg);border:1px solid var(--rbd)}
.sml{font-size:9px;color:var(--fa);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.smv{font-size:13px;font-weight:700}
.smv.g{color:var(--g)}
.smv.r{color:var(--r)}
.prow{display:flex;justify-content:space-between;margin-bottom:5px;margin-top:16px}
.plbl{font-size:10px;color:var(--fa)}
.ppct{font-size:10px;font-weight:700}
.pbar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s,background .3s}

/* PANEL */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ptitle{font-size:10px;letter-spacing:2.5px;color:var(--fa);text-transform:uppercase;font-weight:600}
.btn-mg{background:transparent;border:1px solid var(--bd);color:var(--fa);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;transition:all .2s}
.btn-mg.og{background:var(--gbg);border-color:var(--g);color:var(--g)}
.btn-mg.or{background:var(--rbg);border-color:var(--r);color:var(--r)}

/* CAT TABS */
.ctabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.ctab{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:transparent;color:var(--fa);transition:all .15s}
.ctab.has{color:var(--tx);border-color:var(--bd2)}
.ctab.ong{background:var(--g);color:#0d0f14;border-color:var(--g)}
.lt .ctab.ong{color:#fff}
.ctab.onr{background:var(--r);color:#fff;border-color:var(--r)}
.cdot{display:inline-block;width:4px;height:4px;border-radius:50%;margin-left:5px;vertical-align:middle}

/* MANAGE BOX */
.mbox{background:var(--bg);border-radius:12px;padding:12px;margin-bottom:8px}
.lt .mbox{background:var(--sur2)}
.mhint{font-size:11px;color:var(--fa);margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{display:flex;align-items:center;background:var(--sur);border-radius:20px;overflow:hidden}
.chip.cg{border:1px solid var(--g)}
.chip.cr{border:1px solid var(--r)}
.chip.cn{border:1px solid var(--bd)}
.chlbl{font-size:11px;font-weight:600;color:var(--fa);padding:4px 10px}
.chip.cg .chlbl{color:var(--g)}
.chip.cr .chlbl{color:var(--r)}
.chdot{font-size:8px;margin-left:2px}
.chdel{background:transparent;border:none;border-left:1px solid var(--bd);color:var(--fa);padding:4px 8px;font-size:12px;transition:all .15s}
.chdel:hover{background:var(--rbg);color:var(--r)}
.atr{display:flex;gap:6px}
.bpg{background:var(--g);color:#0d0f14;border:none;border-radius:8px;padding:0 14px;height:36px;font-weight:700;font-size:13px}
.lt .bpg{color:#fff}
.bpr{background:var(--r);color:#fff;border:none;border-radius:8px;padding:0 14px;height:36px;font-weight:700;font-size:13px}

/* TX ITEMS */
.tlist{display:flex;flex-direction:column;gap:6px;min-height:52px}
.tempty{font-size:12px;color:var(--fa);padding:4px 0}
.titem{display:flex;align-items:center;justify-content:space-between;border-radius:10px;padding:8px 12px;gap:8px}
.titem.ig{background:var(--gbg);border:1px solid var(--gbd)}
.titem.ir{background:var(--rbg);border:1px solid var(--rbd)}
.tinfo{flex:1;min-width:0}
.tdesc{font-size:12px;font-weight:600;color:var(--tx);cursor:text;border-bottom:1px dashed transparent;transition:border-color .15s;display:inline-block;max-width:100%}
.tdesc:hover{border-bottom-color:var(--g)}
.tdate{font-size:10px;color:var(--fa);margin-top:1px}
.tr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tamt{font-size:14px;font-weight:700;cursor:text;border-bottom:1px dashed transparent;transition:border-color .15s;white-space:nowrap}
.tamt:hover{border-bottom-color:currentColor}
.tamt.g{color:var(--g)}
.tamt.r{color:var(--r)}
.bdel{background:var(--rbg);border:1px solid var(--rbd);color:var(--r);border-radius:6px;width:26px;height:26px;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.bdel:hover{background:var(--rbd)}

/* ADD FORM */
.aform{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.afrow{display:flex;gap:6px}
.bcg{background:var(--g);color:#0d0f14;border:none;border-radius:8px;padding:0 14px;height:36px;font-weight:700;font-size:13px;flex-shrink:0}
.lt .bcg{color:#fff}
.bcr{background:var(--r);color:#fff;border:none;border-radius:8px;padding:0 14px;height:36px;font-weight:700;font-size:13px;flex-shrink:0}
.bcanc{background:none;border:none;color:var(--fa);font-size:16px;padding:0 4px;flex-shrink:0}
.badg{background:none;border:1px dashed var(--bd);border-radius:8px;padding:7px 10px;color:var(--fa);font-size:11px;text-align:left;transition:all .15s;margin-top:2px;width:100%}
.badg.gr:hover{border-color:var(--g);color:var(--g)}
.badg.rd:hover{border-color:var(--r);color:var(--r)}
.notabs{font-size:12px;color:var(--fa)}

/* CHARTS */
.cgrid{display:grid;grid-template-columns:1fr 1.4fr;gap:18px;margin-bottom:28px}
.ctit{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:2px}
.csub{font-size:11px;color:var(--fa);margin-bottom:14px}
.pleg{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.plr{display:flex;align-items:center;justify-content:space-between}
.pll{display:flex;align-items:center;gap:7px}
.pdot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pnm{font-size:11px;color:var(--mu)}
.pvl{font-size:11px;font-weight:700;color:var(--tx)}

/* LOG */
.lh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.lt2{font-size:13px;font-weight:700}
.lc{margin-left:8px;background:var(--sur2);border:1px solid var(--bd);padding:2px 8px;border-radius:20px;font-size:11px;color:var(--fa);font-weight:500}
.ls{font-size:11px;color:var(--fa);margin-top:2px}
.ftabs{display:flex;gap:5px}
.ftab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--bd);background:transparent;color:var(--fa);transition:all .15s}
.ftab.on{background:var(--tx);color:var(--sur);border-color:var(--tx)}
.llist{display:flex;flex-direction:column;gap:2px}
.li{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:12px;transition:background .12s}
.li:hover{background:var(--sur2)}
.ll{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.lic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.lic.g{background:var(--gbg);border:1px solid var(--gbd);color:var(--g)}
.lic.r{background:var(--rbg);border:1px solid var(--rbd);color:var(--r)}
.ldesc{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lmeta{font-size:11px;color:var(--fa);margin-top:1px}
.lright{display:flex;align-items:center;gap:12px;flex-shrink:0}
.lamt{font-size:14px;font-weight:700}
.lamt.g{color:var(--g)}
.lamt.r{color:var(--r)}
.bld{background:none;border:none;color:var(--bd2);font-size:14px;transition:color .15s;padding:2px 4px}
.bld:hover{color:var(--r)}
.lempty{text-align:center;color:var(--fa);padding:32px 0;font-size:13px}

/* YEAR */
.ygrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:24px}
.ytc{border-radius:16px;padding:22px;box-shadow:var(--sh)}
.ytc.gc{background:var(--gbg);border:1px solid var(--gbd)}
.ytc.rc{background:var(--rbg);border:1px solid var(--rbd)}
.ytl{font-size:10px;color:var(--fa);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;font-weight:600}
.ytv{font-size:28px;font-weight:700}
.ycharts{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
.ymtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px;padding:6px;background:var(--sur2);border-radius:14px;border:1px solid var(--bd)}
.ymtab{padding:6px 13px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid var(--bd);background:transparent;color:var(--fa);transition:all .18s}
.ymtab.has{color:var(--tx);border-color:var(--bd2)}
.ymtab.on{background:var(--tx);color:var(--sur);border-color:var(--tx)}
.ymdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-left:4px;vertical-align:middle}
.ymd{animation:fu .2s ease}
.ymsg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.ymsc{background:var(--sur2);border:1px solid var(--bd);border-radius:12px;padding:12px 16px}
.ymsl{font-size:9px;color:var(--fa);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:600}
.ymsv{font-size:20px;font-weight:700}
.ymtl{display:flex;flex-direction:column;gap:2px;max-height:320px;overflow-y:auto}
.ymti{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:10px;background:var(--sur2);border:1px solid var(--bd);margin-bottom:2px}
.ymtic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ymtic.g{background:var(--gbg);border:1px solid var(--gbd);color:var(--g)}
.ymtic.r{background:var(--rbg);border:1px solid var(--rbd);color:var(--r)}
.ymti-info{flex:1;min-width:0;margin-left:10px}
.ymtidesc{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ymticat{font-size:10px;color:var(--fa)}
.ymtiamt{font-size:13px;font-weight:700;flex-shrink:0}
.ymtiamt.g{color:var(--g)}
.ymtiamt.r{color:var(--r)}
.ymgoto{margin-top:14px;text-align:center}
.bmgoto{background:var(--sur2);border:1px solid var(--bd);border-radius:10px;padding:8px 18px;color:var(--mu);font-size:12px;font-weight:600;transition:all .15s}
.bmgoto:hover{border-color:var(--g);color:var(--g)}
.ymempty{text-align:center;color:var(--fa);padding:28px 0;font-size:13px}

/* YEAR TABLE */
.ytable{border-radius:12px;overflow:hidden;border:1px solid var(--bd)}
.yth{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 70px;background:var(--sur2)}
.yth>div{font-size:10px;color:var(--fa);text-transform:uppercase;letter-spacing:1.5px;padding:10px 14px;font-weight:700;border-bottom:1px solid var(--bd)}
.ytb{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 70px}
.ytd{padding:11px 14px;border-bottom:1px solid var(--bd);font-size:13px;background:var(--sur)}
.ytd.fa{color:var(--fa)}
.ytd.g{color:var(--g);font-weight:600}
.ytd.r{color:var(--r);font-weight:600}
.ytd.b{font-weight:700}
.ytf-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 70px;border-top:2px solid var(--bd2);background:var(--sur2)}
.ytf{padding:13px 14px;font-size:14px;font-weight:700}

/* PICKER */
#picker{position:fixed;inset:0;background:#0d0f14;display:flex;align-items:center;justify-content:center;z-index:999}
.pbox{background:#161921;border:1px solid #1f2333;border-radius:24px;padding:40px 44px;width:400px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.plogo{text-align:center;margin-bottom:28px}
.pemj{font-size:36px;margin-bottom:10px}
.ptit{font-size:20px;font-weight:800;color:#e8eaf0;letter-spacing:2px;text-transform:uppercase}
.psub{font-size:12px;color:#4a5168;margin-top:6px}
.psect{font-size:11px;color:#4a5168;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-weight:600}
.pusers{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.puser{background:#1f2333;border:1px solid #2e3347;border-radius:12px;padding:12px 16px;color:#e8eaf0;font-size:14px;font-weight:600;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;width:100%}
.puser:hover{border-color:#4ade80;color:#4ade80}
.psep{height:1px;background:#1f2333;margin-bottom:20px}
.prow{display:flex;gap:8px}
.pinp{flex:1;background:#1f2333;border:1px solid #2e3347;border-radius:10px;padding:10px 14px;color:#e8eaf0;font-size:13px;outline:none;font-family:'Plus Jakarta Sans',sans-serif}
.pinp:focus{border-color:#4ade80}
.penter{background:#4ade80;color:#0d0f14;border:none;border-radius:10px;padding:0 18px;font-weight:700;font-size:14px;white-space:nowrap;height:40px}

@media(max-width:700px){
  .sgrid,.ygrid{grid-template-columns:1fr}
  .cgrid,.ycharts{grid-template-columns:1fr}
  .ymsg{grid-template-columns:1fr}
  .yth,.ytb,.ytf-row{grid-template-columns:1fr 1fr 1fr}
  .yth>div:nth-child(4),.yth>div:nth-child(5),
  .ytd:nth-child(5n-1),.ytd:nth-child(5n),.ytf:nth-child(4),.ytf:last-child{display:none}
}
</style>
</head>
<body>

<!-- PICKER -->
<div id="picker">
  <div class="pbox">
    <div class="plogo">
      <div class="pemj">💰</div>
      <div class="ptit">FINANÇAS 2026</div>
      <div class="psub">Quem está acessando?</div>
    </div>
    <div id="pu"></div>
    <div class="psect" id="pnl">Criar perfil</div>
    <div class="prow">
      <input class="pinp" id="pinp" placeholder="Seu nome ou apelido" autocomplete="off"/>
      <button class="penter" onclick="pickerGo()">Entrar</button>
    </div>
  </div>
</div>

<!-- NAV -->
<div id="nav" style="display:none">
  <div class="ni">
    <div class="logo">
      <div class="logo-ic">💰</div>
      <div>
        <div class="logo-t">FINANÇAS 2026</div>
        <div class="logo-s" id="nu"></div>
      </div>
    </div>
    <div class="nav-r">
      <button class="btn-th" onclick="togTheme()">
        <span id="tic">☀️</span><span id="tlbl">Tema Claro</span>
      </button>
      <button class="btn-sw" onclick="doSwitch()">Trocar perfil</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">
  <div class="mtabs-wrap"><div class="mtabs" id="mtabs"></div></div>
  <div id="content"></div>
</div>

<script>
// ── CONSTANTS ──
const MO = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MK = MO.map((_,i)=>`2026-${String(i+1).padStart(2,"0")}`);
const CC_D = ["#4ade80","#f87171","#60a5fa","#fbbf24","#a78bfa","#fb923c"];
const CC_L = ["#16a34a","#dc2626","#2563eb","#d97706","#7c3aed","#ea580c"];
const SEED = [
  {id:1,desc:"Salário",amt:5800,t:"in",cat:"Salário",dt:"2026-01-01"},

  {id:4,desc:"Conta de Luz",amt:160,t:"out",cat:"Contas",dt:"2026-01-15"},
  {id:5,desc:"Salário",amt:5800,t:"in",cat:"Salário",dt:"2026-02-01"},
  {id:6,desc:"Aluguel",amt:1500,t:"out",cat:"Moradia",dt:"2026-02-05"},
  {id:7,desc:"Mercado",amt:450,t:"out",cat:"Alimentação",dt:"2026-02-12"},
  {id:8,desc:"Netflix",amt:45,t:"out",cat:"Lazer",dt:"2026-02-18"},

  {id:11,desc:"Mercado",amt:430,t:"out",cat:"Alimentação",dt:"2026-03-04"},

  {id:13,desc:"Conta de Luz",amt:180,t:"out",cat:"Contas",dt:"2026-03-07"},
  {id:14,desc:"Netflix",amt:45,t:"out",cat:"Lazer",dt:"2026-03-08"},
  {id:15,desc:"Restaurante",amt:95,t:"out",cat:"Alimentação",dt:"2026-03-10"},
  {id:16,desc:"Dividendos",amt:320,t:"in",cat:"Dividendos",dt:"2026-03-12"},
];

// ── STATE ──
let user=null,dark=true,txs=[],inCats=[],outCats=[];
let curTab="2026-03",curFilt="all",ymTab=null;
// per-panel state
const PS = {
  in:  {tab:"",mng:false,adding:false},
  out: {tab:"",mng:false,adding:false},
};
let charts={};

// ── STORAGE ──
const S={
  k:(u,k)=>`f26_${u}_${k}`,
  sv(u,k,v){try{localStorage.setItem(S.k(u,k),JSON.stringify(v))}catch(e){}},
  ld(u,k,d){try{const v=localStorage.getItem(S.k(u,k));return v!=null?JSON.parse(v):d}catch(e){return d}},
  users(){try{return JSON.parse(localStorage.getItem("f26_users")||"[]")}catch(e){return[]}},
  addU(u){try{const a=S.users();if(!a.includes(u))localStorage.setItem("f26_users",JSON.stringify([...a,u]))}catch(e){}},
};

// ── UTILS ──
const R=v=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v);
const FD=d=>new Date(d+"T12:00").toLocaleDateString("pt-BR");
const uid=()=>Date.now()+Math.floor(Math.random()*999);
const cs=list=>{
  const e=list.filter(t=>t.t==="in").reduce((s,t)=>s+t.amt,0);
  const o=list.filter(t=>t.t==="out").reduce((s,t)=>s+t.amt,0);
  return{e,o,s:e-o};
};
const esc=s=>String(s).replace(/'/g,"\\'");

function saveAll(){
  if(!user)return;
  S.sv(user,"txs",txs);S.sv(user,"ic",inCats);S.sv(user,"oc",outCats);S.sv(user,"dk",dark);
}

// ── PICKER ──
function renderPicker(){
  const us=S.users();
  const el=document.getElementById("pu");
  const lbl=document.getElementById("pnl");
  if(us.length){
    lbl.textContent="Novo perfil";
    el.innerHTML=`<div class="psect">Perfis existentes</div>
      <div class="pusers">${us.map(u=>`<button class="puser" onclick="login('${esc(u)}')"><span style="font-size:18px">👤</span>${u}</button>`).join("")}</div>
      <div class="psep"></div>`;
  } else {
    el.innerHTML="";lbl.textContent="Criar perfil";
  }
}
document.getElementById("pinp").addEventListener("keydown",e=>{if(e.key==="Enter")pickerGo();});
function pickerGo(){const v=document.getElementById("pinp").value.trim();if(v)login(v);}
function login(u){
  S.addU(u);user=u;
  txs=S.ld(u,"txs",null)??JSON.parse(JSON.stringify(SEED));
  inCats=S.ld(u,"ic",["Salário","Freelance","Dividendos"]);
  outCats=S.ld(u,"oc",["Moradia","Alimentação","Lazer","Contas"]);
  dark=S.ld(u,"dk",true);
  PS.in.tab=inCats[0]||"";PS.out.tab=outCats[0]||"";
  applyTheme();
  document.getElementById("picker").style.display="none";
  document.getElementById("nav").style.display="";
  document.getElementById("main").style.display="";
  document.getElementById("nu").textContent="👤 "+u;
  renderMTabs();renderContent();
}
function doSwitch(){saveAll();user=null;document.getElementById("picker").style.display="flex";document.getElementById("nav").style.display="none";document.getElementById("main").style.display="none";document.getElementById("pinp").value="";renderPicker();}

// ── THEME ──
function applyTheme(){
  document.body.classList.toggle("lt",!dark);
  document.getElementById("tic").textContent=dark?"☀️":"🌙";
  document.getElementById("tlbl").textContent=dark?"Tema Claro":"Tema Escuro";
}
function togTheme(){dark=!dark;applyTheme();S.sv(user,"dk",dark);renderContent();}

// ── MONTH TABS ──
function renderMTabs(){
  document.getElementById("mtabs").innerHTML=
    MK.map((k,i)=>{const h=txs.some(t=>t.dt.startsWith(k)),on=curTab===k;
      return`<button class="mtab${h?" has":""}${on?" on":""}" onclick="swTab('${k}')">${MO[i]}${h&&!on?'<span class="dot"></span>':""}</button>`;
    }).join("")+
    `<div class="tsep"></div><button class="ytab${curTab==="year"?" on":""}" onclick="swTab('year')">Ano Total ★</button>`;
}
function swTab(k){saveAll();curTab=k;curFilt="all";ymTab=null;PS.in.mng=false;PS.out.mng=false;PS.in.adding=false;PS.out.adding=false;renderMTabs();renderContent();}

// ── MAIN RENDER ──
function renderContent(){
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
  curTab==="year"?renderYear():renderMonth();
}

// ── MONTH RENDER ──
function renderMonth(){
  const mt=txs.filter(t=>t.dt.startsWith(curTab));
  const {e,o,s}=cs(mt);
  const pct=e>0?Math.min(100,Math.round((o/e)*100)):0;
  const sc=s>=0?"var(--g)":"var(--r)";
  const pc=pct>80?"linear-gradient(90deg,var(--y),var(--r))":pct>60?"var(--y)":"var(--g)";
  const mi=MK.indexOf(curTab);
  const pie=Object.entries(mt.filter(t=>t.t==="out").reduce((a,t)=>{a[t.cat]=(a[t.cat]||0)+t.amt;return a},{})).map(([n,v])=>({n,v}));
  let fl=mt;
  if(curFilt==="in")fl=mt.filter(t=>t.t==="in");
  if(curFilt==="out")fl=mt.filter(t=>t.t==="out");

  const el=document.getElementById("content");
  el.className="fade";
  el.innerHTML=`
  <div class="sgrid">
    <div class="card scard">
      <div class="sglow" id="sg" style="background:${sc}"></div>
      <div class="slbl">Saldo do Mês</div>
      <div class="sval" id="sv" style="color:${sc}">${R(s)}</div>
      <div class="smg">
        <div class="smb g"><div class="sml">↑ Entradas</div><div class="smv g" id="sme">${R(e)}</div></div>
        <div class="smb r"><div class="sml">↓ Saídas</div><div class="smv r" id="smo">${R(o)}</div></div>
      </div>
      ${e>0?`<div class="prow"><span class="plbl">Comprometido</span><span class="ppct" id="spct" style="color:${pct>80?"var(--r)":pct>60?"var(--y)":"var(--g)"}">${pct}%</span></div>
      <div class="pbar"><div class="pfill" id="spf" style="width:${pct}%;background:${pc}"></div></div>`:""}
    </div>
    <div class="card" id="p-in">${buildPanel("in",mt)}</div>
    <div class="card" id="p-out">${buildPanel("out",mt)}</div>
  </div>
  ${mt.length?`
  <div class="cgrid">
    <div class="card">
      <div class="ctit">Gastos por Categoria</div>
      <div class="csub">Distribuição das saídas</div>
      ${pie.length?`<canvas id="pc" height="160"></canvas><div class="pleg" id="pl"></div>`
        :`<div style="text-align:center;color:var(--fa);padding:40px 0;font-size:13px">Sem saídas este mês</div>`}
    </div>
    <div class="card">
      <div class="ctit">Resumo do Mês</div>
      <div class="csub">Entradas vs Saídas — ${MO[mi]}</div>
      <canvas id="bc" height="220"></canvas>
    </div>
  </div>`:""}
  <div class="card">
    <div class="lh">
      <div>
        <div class="lt2">Transações <span class="lc">${mt.length}</span></div>
        <div class="ls">${MO[mi]} 2026</div>
      </div>
      <div class="ftabs">
        <button class="ftab${curFilt==="all"?" on":""}" onclick="setFilt('all')">Todos</button>
        <button class="ftab${curFilt==="in"?" on":""}" onclick="setFilt('in')">Entrada</button>
        <button class="ftab${curFilt==="out"?" on":""}" onclick="setFilt('out')">Saída</button>
      </div>
    </div>
    <div class="llist">
      ${fl.length?fl.map(tx=>`
        <div class="li">
          <div class="ll">
            <div class="lic ${tx.t==="in"?"g":"r"}">${tx.t==="in"?"↑":"↓"}</div>
            <div><div class="ldesc">${tx.desc}</div><div class="lmeta">${tx.cat} · ${FD(tx.dt)}</div></div>
          </div>
          <div class="lright">
            <span class="lamt ${tx.t==="in"?"g":"r"}">${tx.t==="in"?"+":"−"}${R(tx.amt)}</span>
            <button class="bld" onclick="delTx(${tx.id})">✕</button>
          </div>
        </div>`).join("")
      :`<div class="lempty">Nenhuma transação em ${MO[mi]}</div>`}
    </div>
  </div>`;

  // charts
  if(pie.length){
    const cc=dark?CC_D:CC_L;
    charts.pie=new Chart(document.getElementById("pc").getContext("2d"),{
      type:"doughnut",
      data:{labels:pie.map(d=>d.n),datasets:[{data:pie.map(d=>d.v),backgroundColor:cc,borderWidth:0,hoverOffset:4}]},
      options:{cutout:"62%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+R(c.raw)}}},animation:{duration:400}}
    });
    document.getElementById("pl").innerHTML=pie.map((d,i)=>`
      <div class="plr"><div class="pll"><div class="pdot" style="background:${cc[i%cc.length]}"></div><span class="pnm">${d.n}</span></div>
      <span class="pvl">${R(d.v)}</span></div>`).join("");
  }
  if(mt.length){
    const bc=document.getElementById("bc");
    if(bc) charts.bar=new Chart(bc.getContext("2d"),{
      type:"bar",
      data:{labels:[MO[mi]],datasets:[
        {label:"Entradas",data:[e],backgroundColor:dark?"#4ade80":"#16a34a",borderRadius:8},
        {label:"Saídas",data:[o],backgroundColor:dark?"#f87171":"#dc2626",borderRadius:8}
      ]},
      options:{plugins:{legend:{labels:{color:"var(--mu)",font:{family:"'Plus Jakarta Sans'",size:11}}}},
        scales:{x:{grid:{display:false},ticks:{color:"var(--fa)"}},y:{grid:{color:dark?"#1f2333":"#e8edf4"},ticks:{color:"var(--fa)",callback:v=>"R$"+v/1000+"k"}}},animation:{duration:400}}
    });
  }
}

// ── PANEL BUILDER — identical for in & out ──
function buildPanel(type,mTxs){
  const ps=PS[type];
  const cats=type==="in"?inCats:outCats;
  const col=type==="in"?"g":"r";
  const title=type==="in"?"↑ Entradas":"↓ Saídas";
  const mgCls=ps.mng?(type==="in"?"og":"or"):"";

  // group
  const grp={};
  mTxs.filter(t=>t.t===type).forEach(t=>{if(!grp[t.cat])grp[t.cat]=[];grp[t.cat].push(t);});
  const cur=grp[ps.tab]||[];

  // cat tabs or manage
  let catHtml="";
  if(ps.mng){
    catHtml=`<div class="mbox">
      <div class="mhint">Clique ✕ para excluir aba e seus lançamentos</div>
      <div class="chips">${cats.map(c=>{
        const h=(grp[c]||[]).length>0;
        return`<div class="chip ${h?"c"+col:"cn"}">
          <span class="chlbl">${c}${h?'<span class="chdot">●</span>':""}</span>
          <button class="chdel" onclick="delCat('${type}','${esc(c)}')">✕</button>
        </div>`;
      }).join("")}</div>
      <div class="atr">
        <input id="nt-${type}" placeholder="Nome da nova aba..." style="font-size:12px" onkeydown="if(event.key==='Enter')addCat('${type}')"/>
        <button class="bp${col}" onclick="addCat('${type}')">+</button>
      </div>
    </div>`;
  } else {
    if(cats.length===0){
      catHtml=`<div class="notabs">Crie abas clicando em ⚙</div>`;
    } else {
      catHtml=`<div class="ctabs">${cats.map(c=>{
        const h=(grp[c]||[]).length>0,on=ps.tab===c;
        return`<button class="ctab${h?" has":""}${on?" on"+col:""}" onclick="swCat('${type}','${esc(c)}')">${c}${h&&!on?`<span class="cdot" style="background:var(--${col})"></span>`:""}</button>`;
      }).join("")}</div>`;
    }
  }

  // items
  let items="";
  if(!ps.mng){
    if(cats.length>0&&cur.length===0&&!ps.adding) items=`<div class="tempty">Sem lançamentos de ${ps.tab||"..."}</div>`;
    cur.forEach(tx=>{
      items+=`<div class="titem i${col}" id="ti-${tx.id}">
        <div class="tinfo">
          <span class="tdesc" id="d-${tx.id}" onclick="edDesc(${tx.id})">${tx.desc} <span style="font-size:9px;color:var(--fa)">✎</span></span>
          <div class="tdate">${FD(tx.dt)}</div>
        </div>
        <div class="tr">
          <span class="tamt ${col}" id="a-${tx.id}" onclick="edAmt(${tx.id})">${R(tx.amt)}</span>
          <button class="bdel" onclick="delTx(${tx.id})">✕</button>
        </div>
      </div>`;
    });
    if(ps.adding){
      items+=`<div class="aform">
        <div class="afrow">
          <input id="ad-${type}" placeholder="Descrição (padrão: ${esc(ps.tab||type)})" style="flex:1"/>
        </div>
        <div class="afrow">
          <input id="aa-${type}" type="number" placeholder="Valor (R$)" style="flex:1" onkeydown="if(event.key==='Enter')confAdd('${type}');if(event.key==='Escape')cancAdd('${type}')"/>
          <button class="bc${col}" onclick="confAdd('${type}')">✓</button>
          <button class="bcanc" onclick="cancAdd('${type}')">✕</button>
        </div>
      </div>`;
    } else if(cats.length>0){
      items+=`<button class="badg ${col==="g"?"gr":"rd"}" onclick="startAdd('${type}')">+ adicionar ${(ps.tab||type).toLowerCase()}</button>`;
    }
  }

  return`<div class="ph">
    <div class="ptitle">${title}</div>
    <button class="btn-mg ${mgCls}" onclick="togMng('${type}')">${ps.mng?"✓ fechar":"⚙ abas"}</button>
  </div>
  ${catHtml}
  <div class="tlist">${items}</div>`;
}

// ── PANEL ACTIONS ──
function togMng(t){PS[t].mng=!PS[t].mng;PS[t].adding=false;rePanel(t);}
function swCat(t,c){PS[t].tab=c;PS[t].adding=false;rePanel(t);}
function addCat(t){
  const v=document.getElementById("nt-"+t)?.value.trim();if(!v)return;
  const arr=t==="in"?inCats:outCats;
  if(!arr.includes(v)){arr.push(v);PS[t].tab=v;}
  saveAll();rePanel(t);
}
function delCat(t,c){
  txs=txs.filter(tx=>!(tx.t===t&&tx.cat===c));
  if(t==="in"){inCats=inCats.filter(x=>x!==c);if(PS.in.tab===c)PS.in.tab=inCats[0]||"";}
  else{outCats=outCats.filter(x=>x!==c);if(PS.out.tab===c)PS.out.tab=outCats[0]||"";}
  saveAll();rePanel(t);reSaldo();
}
function startAdd(t){PS[t].adding=true;rePanel(t);setTimeout(()=>document.getElementById("ad-"+t)?.focus(),50);}
function cancAdd(t){PS[t].adding=false;rePanel(t);}
function confAdd(t){
  const n=parseFloat((document.getElementById("aa-"+t)?.value||"").replace(",","."));
  if(isNaN(n)||n<=0)return;
  const desc=document.getElementById("ad-"+t)?.value.trim()||PS[t].tab;
  txs.unshift({id:uid(),desc,amt:n,t,cat:PS[t].tab,dt:curTab+"-01"});
  saveAll();PS[t].adding=false;
  rePanel(t);reSaldo();renderMTabs();
  // refresh log
  const mt=txs.filter(x=>x.dt.startsWith(curTab));
  const fl=curFilt==="all"?mt:mt.filter(x=>x.t===curFilt);
  const mi=MK.indexOf(curTab);
  const llist=document.querySelector(".llist");
  const lc=document.querySelector(".lc");
  if(lc)lc.textContent=mt.length;
  if(llist) llist.innerHTML=fl.length?fl.map(tx=>`
    <div class="li">
      <div class="ll"><div class="lic ${tx.t==="in"?"g":"r"}">${tx.t==="in"?"↑":"↓"}</div>
      <div><div class="ldesc">${tx.desc}</div><div class="lmeta">${tx.cat} · ${FD(tx.dt)}</div></div></div>
      <div class="lright"><span class="lamt ${tx.t==="in"?"g":"r"}">${tx.t==="in"?"+":"−"}${R(tx.amt)}</span>
      <button class="bld" onclick="delTx(${tx.id})">✕</button></div>
    </div>`).join(""):`<div class="lempty">Nenhuma transação em ${MO[mi]}</div>`;
}

function rePanel(t){
  const mt=txs.filter(x=>x.dt.startsWith(curTab));
  document.getElementById("p-"+t).innerHTML=buildPanel(t,mt);
}
function reSaldo(){
  const mt=txs.filter(x=>x.dt.startsWith(curTab));
  const {e,o,s}=cs(mt);
  const sc=s>=0?"var(--g)":"var(--r)";
  const pct=e>0?Math.min(100,Math.round((o/e)*100)):0;
  const sv=document.getElementById("sv"),sg=document.getElementById("sg");
  const sme=document.getElementById("sme"),smo=document.getElementById("smo");
  if(sv){sv.textContent=R(s);sv.style.color=sc;}
  if(sg)sg.style.background=sc;
  if(sme)sme.textContent=R(e);
  if(smo)smo.textContent=R(o);
  const pf=document.getElementById("spf"),pp=document.getElementById("spct");
  if(pf){pf.style.width=pct+"%";pf.style.background=pct>80?"linear-gradient(90deg,var(--y),var(--r))":pct>60?"var(--y)":"var(--g)";}
  if(pp){pp.textContent=pct+"%";pp.style.color=pct>80?"var(--r)":pct>60?"var(--y)":"var(--g)";}
  renderMTabs();
}

// inline edit desc
function edDesc(id){
  const el=document.getElementById("d-"+id);if(!el)return;
  const tx=txs.find(t=>t.id===id);if(!tx)return;
  el.outerHTML=`<input id="de-${id}" value="${esc(tx.desc)}" style="background:transparent;border:none;border-bottom:2px solid var(--${tx.t==="in"?"g":"r"});outline:none;font-size:12px;font-weight:600;color:var(--tx);width:100%;font-family:inherit" autofocus/>`;
  const inp=document.getElementById("de-"+id);inp?.select();
  const done=()=>{const v=inp?.value.trim();if(v){tx.desc=v;saveAll();}rePanel(tx.t);};
  inp?.addEventListener("blur",done);
  inp?.addEventListener("keydown",e=>{if(e.key==="Enter")done();if(e.key==="Escape")rePanel(tx.t);});
}
// inline edit amount
function edAmt(id){
  const el=document.getElementById("a-"+id);if(!el)return;
  const tx=txs.find(t=>t.id===id);if(!tx)return;
  const col=tx.t==="in"?"var(--g)":"var(--r)";
  el.outerHTML=`<input id="ae-${id}" type="number" value="${tx.amt}" style="background:transparent;border:none;border-bottom:2px solid ${col};outline:none;font-size:14px;font-weight:700;color:${col};width:80px;font-family:inherit" autofocus/>`;
  const inp=document.getElementById("ae-"+id);inp?.select();
  const done=()=>{const n=parseFloat(inp?.value||"");if(!isNaN(n)&&n>0){tx.amt=n;saveAll();}rePanel(tx.t);reSaldo();};
  inp?.addEventListener("blur",done);
  inp?.addEventListener("keydown",e=>{if(e.key==="Enter")done();if(e.key==="Escape")rePanel(tx.t);});
}
// delete
function delTx(id){
  const tx=txs.find(t=>t.id===id);
  txs=txs.filter(t=>t.id!==id);saveAll();
  if(tx)rePanel(tx.t);
  renderMonth();
}
function setFilt(f){curFilt=f;renderMonth();}

// ── YEAR ──
function renderYear(){
  const ys=cs(txs);
  const sc=ys.s>=0?"var(--g)":"var(--r)";
  const sbg=ys.s>=0?"var(--gbg)":"var(--rbg)";
  const sbd=ys.s>=0?"var(--gbd)":"var(--rbd)";
  const yd=MK.map((k,i)=>{const s=cs(txs.filter(t=>t.dt.startsWith(k)));return{m:MO[i],key:k,...s};});

  let det="";
  if(ymTab){
    const mt=txs.filter(t=>t.dt.startsWith(ymTab));
    const ms=cs(mt);const mi=MK.indexOf(ymTab);
    const sco=ms.s>=0?"var(--g)":"var(--r)";
    det=`<div class="ymd">
      <div class="ymsg">
        <div class="ymsc"><div class="ymsl">Saldo — ${MO[mi]}</div><div class="ymsv" style="color:${sco}">${R(ms.s)}</div></div>
        <div class="ymsc"><div class="ymsl">Entradas — ${MO[mi]}</div><div class="ymsv" style="color:var(--g)">${R(ms.e)}</div></div>
        <div class="ymsc"><div class="ymsl">Saídas — ${MO[mi]}</div><div class="ymsv" style="color:var(--r)">${R(ms.o)}</div></div>
      </div>
      ${mt.length?`<div class="ymtl">${mt.map(tx=>`
        <div class="ymti">
          <div class="ymtic ${tx.t==="in"?"g":"r"}">${tx.t==="in"?"↑":"↓"}</div>
          <div class="ymti-info"><div class="ymtidesc">${tx.desc}</div><div class="ymticat">${tx.cat} · ${FD(tx.dt)}</div></div>
          <span class="ymtiamt ${tx.t==="in"?"g":"r"}">${tx.t==="in"?"+":"−"}${R(tx.amt)}</span>
        </div>`).join("")}</div>
      `:`<div class="ymempty">Nenhuma transação em ${MO[mi]}</div>`}
      <div class="ymgoto"><button class="bmgoto" onclick="swTab('${ymTab}')">Ir para ${MO[mi]} para editar →</button></div>
    </div>`;
  } else {
    det=`<div class="ytable">
      <div class="yth"><div>Mês</div><div>Entradas</div><div>Saídas</div><div>Saldo</div><div></div></div>
      <div class="ytb">${yd.map(row=>{
        const has=txs.some(t=>t.dt.startsWith(row.key));
        const rsc=row.s>=0?"var(--g)":"var(--r)";
        return`<div class="ytd${has?"":" fa"}">${row.m}</div>
          <div class="ytd g">${has?R(row.e):"—"}</div>
          <div class="ytd r">${has?R(row.o):"—"}</div>
          <div class="ytd b" style="color:${rsc}">${has?R(row.s):"—"}</div>
          <div class="ytd"><button style="background:var(--sur2);border:1px solid var(--bd);color:var(--mu);border-radius:8px;padding:3px 10px;font-size:11px;transition:all .15s" onmouseover="this.style.borderColor='var(--g)';this.style.color='var(--g)'" onmouseout="this.style.borderColor='var(--bd)';this.style.color='var(--mu)'" onclick="setYM('${row.key}')">ver</button></div>`;
      }).join("")}</div>
      <div class="ytf-row">
        <div class="ytf" style="color:var(--y)">Total 2026</div>
        <div class="ytf" style="color:var(--g)">${R(ys.e)}</div>
        <div class="ytf" style="color:var(--r)">${R(ys.o)}</div>
        <div class="ytf" style="color:${sc}">${R(ys.s)}</div>
        <div class="ytf"></div>
      </div>
    </div>`;
  }

  const el=document.getElementById("content");
  el.className="fade";
  el.innerHTML=`
  <div class="ygrid">
    <div class="ytc" style="background:${sbg};border:1px solid ${sbd};box-shadow:var(--sh)"><div class="ytl">Saldo Anual</div><div class="ytv" style="color:${sc}">${R(ys.s)}</div></div>
    <div class="ytc gc" style="box-shadow:var(--sh)"><div class="ytl">Total Entradas</div><div class="ytv" style="color:var(--g)">${R(ys.e)}</div></div>
    <div class="ytc rc" style="box-shadow:var(--sh)"><div class="ytl">Total Saídas</div><div class="ytv" style="color:var(--r)">${R(ys.o)}</div></div>
  </div>
  <div class="ycharts">
    <div class="card"><div class="ctit">Evolução do Saldo</div><div class="csub">Saldo mensal 2026</div><canvas id="yl" height="190"></canvas></div>
    <div class="card"><div class="ctit">Entradas vs Saídas</div><div class="csub">Comparativo 2026</div><canvas id="yb" height="190"></canvas></div>
  </div>
  <div class="card">
    <div class="ctit" style="margin-bottom:2px">Detalhamento por Mês</div>
    <div class="csub">Selecione um mês para expandir</div>
    <div class="ymtabs">${yd.map(row=>{
      const has=txs.some(t=>t.dt.startsWith(row.key)),on=ymTab===row.key;
      const ms=cs(txs.filter(t=>t.dt.startsWith(row.key)));
      const dc=ms.s>=0?"var(--g)":"var(--r)";
      return`<button class="ymtab${has?" has":""}${on?" on":""}" onclick="setYM('${row.key}')">${row.m}${has&&!on?`<span class="ymdot" style="background:${dc}"></span>`:""}</button>`;
    }).join("")}</div>
    ${det}
  </div>`;

  // line
  charts.yl=new Chart(document.getElementById("yl").getContext("2d"),{
    type:"line",
    data:{labels:yd.map(d=>d.m),datasets:[{label:"Saldo",data:yd.map(d=>d.s),borderColor:dark?"#4ade80":"#16a34a",backgroundColor:"transparent",borderWidth:2.5,pointBackgroundColor:dark?"#4ade80":"#16a34a",pointRadius:3,tension:0.3}]},
    options:{plugins:{legend:{labels:{color:"var(--mu)",font:{family:"'Plus Jakarta Sans'",size:11}}}},scales:{x:{grid:{display:false},ticks:{color:"var(--fa)"}},y:{grid:{color:dark?"#1f2333":"#e8edf4"},ticks:{color:"var(--fa)",callback:v=>"R$"+v/1000+"k"}}},animation:{duration:400}}
  });
  // bar
  charts.yb=new Chart(document.getElementById("yb").getContext("2d"),{
    type:"bar",
    data:{labels:yd.map(d=>d.m),datasets:[
      {label:"Entradas",data:yd.map(d=>d.e),backgroundColor:dark?"#4ade80":"#16a34a",borderRadius:4},
      {label:"Saídas",data:yd.map(d=>d.o),backgroundColor:dark?"#f87171":"#dc2626",borderRadius:4}
    ]},
    options:{plugins:{legend:{labels:{color:"var(--mu)",font:{family:"'Plus Jakarta Sans'",size:11}}}},scales:{x:{grid:{display:false},ticks:{color:"var(--fa)"}},y:{grid:{color:dark?"#1f2333":"#e8edf4"},ticks:{color:"var(--fa)",callback:v=>v/1000+"k"}}},animation:{duration:400}}
  });
}
function setYM(k){ymTab=ymTab===k?null:k;renderYear();}

// ── INIT ──
renderPicker();
</script>
</body>
</html>
