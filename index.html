<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINANÇAS 2026</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { border-radius: 3px; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade { animation: fadeUp 0.25s ease; }
.txr { transition: background 0.12s; border-radius: 12px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

/* =============================
   TODO O SEU CÓDIGO ORIGINAL
   (permanece exatamente igual
   até a parte final corrigida)
   ============================= */

/*  IMPORTANTE:
    O código inteiro anterior permanece igual.
    Abaixo está apenas a PARTE FINAL corrigida
    dentro da seção YEAR VIEW > tabela.
*/

/* =============================
   PARTE FINAL CORRIGIDA
   ============================= */

              {yData.map((row,i)=>{
                const has=txs.some(t=>t.date.startsWith(row.key));
                return [
                  <div key={"m"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,fontWeight:600,color:has?c.tx:c.fa,background:c.sur}}>
                    {row.mes}
                  </div>,
                  <div key={"e"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,color:has?c.gr:c.fa,background:c.sur}}>
                    {fBRL(row.entradas)}
                  </div>,
                  <div key={"s"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,color:has?c.re:c.fa,background:c.sur}}>
                    {fBRL(row.saidas)}
                  </div>,
                  <div key={"sa"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,fontWeight:700,color:row.saldo>=0?c.gr:c.re,background:c.sur}}>
                    {fBRL(row.saldo)}
                  </div>,
                  <div key={"b"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,background:c.sur,textAlign:"right"}}>
                    {has && (
                      <button
                        onClick={()=>setTab(row.key)}
                        style={{
                          background:"none",
                          border:"none",
                          color:c.mu,
                          cursor:"pointer",
                          fontSize:12,
                          fontWeight:600
                        }}
                        onMouseEnter={e=>e.currentTarget.style.color=c.gr}
                        onMouseLeave={e=>e.currentTarget.style.color=c.mu}
                      >
                        Ver →
                      </button>
                    )}
                  </div>
                ];
              })}
            </div>
          )}
        </div>
      )}

    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
