<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINANÇAS 2026</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { border-radius: 3px; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade { animation: fadeUp 0.25s ease; }
.txr { transition: background 0.12s; border-radius: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;
const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, LineChart, Line,
        XAxis, YAxis, CartesianGrid, BarChart, Bar, Legend } = Recharts;

const CDK = ["#4ade80","#f87171","#60a5fa","#fbbf24","#a78bfa","#fb923c"];
const CLT = ["#16a34a","#dc2626","#2563eb","#d97706","#7c3aed","#ea580c"];
const fBRL = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v);
const MN = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MK = ["2026-01","2026-02","2026-03","2026-04","2026-05","2026-06","2026-07","2026-08","2026-09","2026-10","2026-11","2026-12"];
const EC = ["Moradia","Alimentação","Transporte","Saúde","Lazer","Contas","Investimentos","Outros"];

const DK = {
  bg:"#0d0f14",sur:"#161921",alt:"#1a1f2e",hov:"rgba(255,255,255,0.03)",
  bd:"#1f2333",bd2:"#2e3347",tx:"#e8eaf0",mu:"#8892a4",fa:"#4a5168",
  gr:"#4ade80",grb:"rgba(74,222,128,0.1)",grd:"rgba(74,222,128,0.3)",
  re:"#f87171",reb:"rgba(248,113,113,0.1)",red:"rgba(248,113,113,0.3)",
  ye:"#fbbf24",inp:"#1f2333",inb:"#2e3347",ton:"#4ade80",tof:"#0d0f14",
  sh:"0 4px 24px rgba(0,0,0,0.35)",cg:"#1f2333",ct:"#4a5168",cb:"#161921"
};
const LT = {
  bg:"#f0f4f8",sur:"#ffffff",alt:"#eef2f7",hov:"rgba(0,0,0,0.025)",
  bd:"#dde3ec",bd2:"#c8d0dc",tx:"#1a2035",mu:"#4a5878",fa:"#8896aa",
  gr:"#16a34a",grb:"rgba(22,163,74,0.08)",grd:"rgba(22,163,74,0.25)",
  re:"#dc2626",reb:"rgba(220,38,38,0.07)",red:"rgba(220,38,38,0.25)",
  ye:"#b45309",inp:"#f8fafc",inb:"#dde3ec",ton:"#1a2035",tof:"#ffffff",
  sh:"0 4px 24px rgba(0,0,0,0.07)",cg:"#e8edf4",ct:"#8896aa",cb:"#ffffff"
};

const SEED = [
  {id:1,desc:"Salário",amount:5800,type:"entrada",category:"Salário",date:"2026-01-01"},
  {id:2,desc:"Aluguel",amount:-1500,type:"saída",category:"Moradia",date:"2026-01-05"},
  {id:3,desc:"Mercado",amount:-390,type:"saída",category:"Alimentação",date:"2026-01-10"},
  {id:4,desc:"Conta de Luz",amount:-160,type:"saída",category:"Contas",date:"2026-01-15"},
  {id:5,desc:"Salário",amount:5800,type:"entrada",category:"Salário",date:"2026-02-01"},
  {id:6,desc:"Aluguel",amount:-1500,type:"saída",category:"Moradia",date:"2026-02-05"},
  {id:7,desc:"Mercado",amount:-450,type:"saída",category:"Alimentação",date:"2026-02-12"},
  {id:8,desc:"Netflix",amount:-45,type:"saída",category:"Lazer",date:"2026-02-18"},
  {id:9,desc:"Salário",amount:5800,type:"entrada",category:"Salário",date:"2026-03-01"},
  {id:10,desc:"Aluguel",amount:-1500,type:"saída",category:"Moradia",date:"2026-03-02"},
  {id:11,desc:"Mercado",amount:-430,type:"saída",category:"Alimentação",date:"2026-03-04"},
  {id:12,desc:"Freelance",amount:1200,type:"entrada",category:"Freelance",date:"2026-03-06"},
  {id:13,desc:"Conta de Luz",amount:-180,type:"saída",category:"Contas",date:"2026-03-07"},
  {id:14,desc:"Netflix",amount:-45,type:"saída",category:"Lazer",date:"2026-03-08"},
  {id:15,desc:"Restaurante",amount:-95,type:"saída",category:"Alimentação",date:"2026-03-10"},
  {id:16,desc:"Dividendos",amount:320,type:"entrada",category:"Dividendos",date:"2026-03-12"},
];

const cst = txs => {
  const e=txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const s=txs.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  return {entradas:e,saidas:s,saldo:e-s};
};

const stor = {
  sv(u,k,v){try{localStorage.setItem("f26_"+u+"_"+k,JSON.stringify(v));}catch(e){}},
  ld(u,k,d){try{const v=localStorage.getItem("f26_"+u+"_"+k);return v!=null?JSON.parse(v):d;}catch(e){return d;}},
  users(){try{return JSON.parse(localStorage.getItem("f26_users")||"[]");}catch(e){return [];}},
  addU(u){try{const a=this.users();if(!a.includes(u))localStorage.setItem("f26_users",JSON.stringify([...a,u]));}catch(e){}}
};

function EDesc({value,onSave,c}){
  const [ed,setEd]=useState(false);
  const [v,setV]=useState(value);
  const r=useRef();
  const ok=()=>{if(v.trim())onSave(v.trim());setEd(false);};
  if(ed) return <input ref={r} value={v} autoFocus onChange={e=>setV(e.target.value)} onBlur={ok}
    onKeyDown={e=>{if(e.key==="Enter")ok();if(e.key==="Escape")setEd(false);}}
    style={{background:"transparent",border:"none",borderBottom:"2px solid "+c.gr,outline:"none",
      color:c.tx,fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,fontWeight:600,width:"100%",padding:"1px 0"}}/>;
  return <span onClick={()=>{setV(value);setEd(true);setTimeout(()=>r.current?.select(),10);}}
    style={{fontSize:12,fontWeight:600,color:c.tx,cursor:"text",borderBottom:"1px dashed transparent",transition:"border-color 0.15s"}}
    onMouseEnter={e=>e.currentTarget.style.borderBottomColor=c.gr}
    onMouseLeave={e=>e.currentTarget.style.borderBottomColor="transparent"}>
    {value} <span style={{fontSize:9,color:c.fa}}>✎</span>
  </span>;
}

function ENum({value,onSave,color,large}){
  const [ed,setEd]=useState(false);
  const [v,setV]=useState("");
  const r=useRef();
  const start=()=>{setV(String(Math.abs(value)));setEd(true);setTimeout(()=>r.current?.select(),10);};
  const ok=()=>{const n=parseFloat(v.replace(",","."));if(!isNaN(n)&&n>0)onSave(n);setEd(false);};
  if(ed) return <input ref={r} value={v} autoFocus type="number" onChange={e=>setV(e.target.value)} onBlur={ok}
    onKeyDown={e=>{if(e.key==="Enter")ok();if(e.key==="Escape")setEd(false);}}
    style={{background:"transparent",border:"none",borderBottom:"2px solid "+color,outline:"none",
      color,fontSize:large?"30px":"14px",fontWeight:700,width:large?"160px":"80px",padding:"2px 0"}}/>;
  return <span onClick={start}
    style={{cursor:"text",color,fontSize:large?"30px":"14px",fontWeight:700,
      borderBottom:"1px dashed transparent",transition:"border-color 0.2s",whiteSpace:"nowrap"}}
    onMouseEnter={e=>e.currentTarget.style.borderBottomColor=color}
    onMouseLeave={e=>e.currentTarget.style.borderBottomColor="transparent"}>
    {value>0?"+":""}{fBRL(value)}
  </span>;
}

function DelBtn({onClick,c}){
  return <button onClick={onClick}
    style={{background:c.reb,border:"1px solid "+c.red,color:c.re,cursor:"pointer",borderRadius:6,
      width:26,height:26,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",
      transition:"all 0.15s",flexShrink:0}}
    onMouseEnter={e=>{e.currentTarget.style.background=c.red;}}
    onMouseLeave={e=>{e.currentTarget.style.background=c.reb;}}>✕</button>;
}

// Reusable tab panel used for both Entradas and Saidas
function TabPanel({title, color, colorBg, colorBd, txs, mKey, onUpdate, onRemove, onAdd, c, dark, cats, setCats, defaultCat}){
  const isIn = color===c.gr;
  const [curTab,setCurTab]=useState(cats[0]||"");
  const [mng,setMng]=useState(false);
  const [newTab,setNewTab]=useState("");
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({desc:"",amount:"",cat:defaultCat||EC[0]});

  useEffect(()=>{if(!cats.includes(curTab))setCurTab(cats[0]||"");},[cats]);

  const groups={};
  txs.forEach(t=>{if(!groups[t.category])groups[t.category]=[];groups[t.category].push(t);});

  const delTab=cat=>{
    (groups[cat]||[]).forEach(t=>onRemove(t.id));
    setCats(cats.filter(x=>x!==cat));
  };
  const addTab=()=>{
    const n=newTab.trim();
    if(!n||cats.includes(n))return;
    setCats([...cats,n]);setCurTab(n);setNewTab("");
  };
  const doAdd=()=>{
    const n=parseFloat(form.amount.replace(",","."));
    if(!isNaN(n)&&n>0){
      const desc=form.desc.trim()||curTab;
      const amount=isIn?n:-n;
      const type=isIn?"entrada":"saída";
      const category=isIn?curTab:form.cat;
      onAdd({desc,amount,type,category,date:mKey+"-01"});
      setForm({desc:"",amount:"",cat:defaultCat||EC[0]});
      setAdding(false);
    }
  };

  const card={background:c.sur,border:"1px solid "+c.bd,borderRadius:20,padding:"24px",boxShadow:c.sh};
  const inp={background:c.inp,border:"1px solid "+c.inb,borderRadius:8,padding:"7px 10px",
    color:c.tx,fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,outline:"none",width:"100%"};
  const btnC={background:color,color:dark?(isIn?"#0d0f14":"#fff"):"#fff",border:"none",borderRadius:8,
    padding:"0 14px",height:36,fontWeight:700,cursor:"pointer",fontSize:13,fontFamily:"'Plus Jakarta Sans',sans-serif"};

  return <div style={card}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <div style={{fontSize:10,letterSpacing:2.5,color:c.fa,textTransform:"uppercase",fontWeight:600}}>{title}</div>
      <button onClick={()=>{setMng(v=>!v);setAdding(false);}}
        style={{background:mng?colorBg:"transparent",border:"1px solid "+(mng?color:c.bd),
          color:mng?color:c.fa,borderRadius:20,padding:"3px 10px",fontSize:10,cursor:"pointer",transition:"all 0.2s",fontWeight:600,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
        {mng?"✓ fechar":"⚙ abas"}
      </button>
    </div>

    {mng ? <div style={{background:dark?"#0d0f14":c.alt,borderRadius:12,padding:"12px"}}>
      <div style={{fontSize:11,color:c.fa,marginBottom:10}}>Clique ✕ para excluir aba e seus lançamentos</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {cats.map(cat=>{
          const has=groups[cat]?.length>0;
          return <div key={cat} style={{display:"flex",alignItems:"center",background:c.sur,
            border:"1px solid "+(has?color:c.bd),borderRadius:20,overflow:"hidden"}}>
            <span style={{fontSize:11,fontWeight:600,color:has?color:c.fa,padding:"4px 10px"}}>
              {cat}{has&&<span style={{fontSize:8,marginLeft:3}}>●</span>}
            </span>
            <button onClick={()=>delTab(cat)}
              style={{background:"transparent",border:"none",borderLeft:"1px solid "+c.bd,
                color:c.fa,cursor:"pointer",padding:"4px 8px",fontSize:12,transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background=c.reb;e.currentTarget.style.color=c.re;}}
              onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=c.fa;}}>✕</button>
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:6}}>
        <input placeholder="Nome da nova aba..." value={newTab} onChange={e=>setNewTab(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter")addTab();}} style={{...inp,flex:1,fontSize:12}}/>
        <button onClick={addTab} style={btnC}>+</button>
      </div>
    </div> : <>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
        {cats.length===0 ? <span style={{fontSize:12,color:c.fa}}>Crie abas clicando em ⚙</span> :
          cats.map(cat=>{
            const has=groups[cat]?.length>0;
            const on=curTab===cat;
            return <button key={cat} onClick={()=>{setCurTab(cat);setAdding(false);}}
              style={{padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",border:"1px solid",
                transition:"all 0.15s",fontFamily:"'Plus Jakarta Sans',sans-serif",
                background:on?color:"transparent",color:on?(dark&&isIn?"#0d0f14":on?"#fff":c.tx):has?c.tx:c.fa,
                borderColor:on?color:has?c.bd2:c.bd}}>
              {cat}{has&&!on&&<span style={{display:"inline-block",width:4,height:4,borderRadius:"50%",
                background:color,marginLeft:5,verticalAlign:"middle"}}/>}
            </button>;
          })
        }
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:6,minHeight:52}}>
        {cats.length>0&&(groups[curTab]||[]).length===0&&!adding&&
          <div style={{fontSize:12,color:c.fa}}>Sem lançamentos de {curTab}</div>}
        {(groups[curTab]||[]).map(tx=>(
          <div key={tx.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            background:colorBg,border:"1px solid "+colorBd,borderRadius:10,padding:"8px 12px",gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <EDesc value={tx.desc} onSave={v=>onUpdate(tx.id,{desc:v})} c={c}/>
              <div style={{fontSize:10,color:c.fa,marginTop:1}}>{new Date(tx.date+"T12:00").toLocaleDateString("pt-BR")}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <ENum value={tx.amount} color={color} onSave={v=>onUpdate(tx.id,{amount:isIn?v:-v})}/>
              <DelBtn onClick={()=>onRemove(tx.id)} c={c}/>
            </div>
          </div>
        ))}

        {adding ? <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <input placeholder={isIn?"Descrição (padrão: "+curTab+")":"Descrição"} value={form.desc}
            onChange={e=>setForm(f=>({...f,desc:e.target.value}))} style={inp}/>
          <div style={{display:"flex",gap:6}}>
            {!isIn && <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} style={{...inp,flex:1}}>
              {EC.map(x=><option key={x}>{x}</option>)}
            </select>}
            <input placeholder="Valor (R$)" type="number" value={form.amount}
              onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
              onKeyDown={e=>{if(e.key==="Enter")doAdd();if(e.key==="Escape")setAdding(false);}}
              style={{...inp,flex:1}}/>
            <button onClick={doAdd} style={btnC}>✓</button>
            <button onClick={()=>setAdding(false)} style={{background:"none",border:"none",color:c.fa,cursor:"pointer",fontSize:16}}>✕</button>
          </div>
        </div> : cats.length>0&&<button onClick={()=>setAdding(true)}
          style={{background:"none",border:"1px dashed "+c.bd,borderRadius:8,padding:"7px 10px",
            color:c.fa,fontSize:11,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",
            textAlign:"left",transition:"all 0.15s",marginTop:2}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.color=color;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=c.bd;e.currentTarget.style.color=c.fa;}}>
          + adicionar {curTab.toLowerCase()}
        </button>}
      </div>
    </>}
  </div>;
}

function SaldoCard({mTxs,c,dark}){
  const {entradas,saidas,saldo}=cst(mTxs);
  const sc=saldo>=0?c.gr:c.re;
  const pct=entradas>0?Math.min(100,Math.round((saidas/entradas)*100)):0;
  return <div style={{background:dark?"linear-gradient(145deg,#161921,#1a2440)":c.sur,
    border:"1px solid "+(dark?"#2a3a60":c.bd),borderRadius:20,padding:"24px",boxShadow:c.sh,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-24,right:-24,width:110,height:110,borderRadius:"50%",background:sc,opacity:0.07,pointerEvents:"none"}}/>
    <div style={{fontSize:10,letterSpacing:2.5,color:c.fa,textTransform:"uppercase",marginBottom:10,fontWeight:600}}>Saldo do Mês</div>
    <ENum value={saldo} onSave={()=>{}} color={sc} large/>
    <div style={{marginTop:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <div style={{background:c.grb,border:"1px solid "+c.grd,borderRadius:12,padding:"10px 12px"}}>
        <div style={{fontSize:9,color:c.fa,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>↑ Entradas</div>
        <div style={{fontSize:13,fontWeight:700,color:c.gr}}>{fBRL(entradas)}</div>
      </div>
      <div style={{background:c.reb,border:"1px solid "+c.red,borderRadius:12,padding:"10px 12px"}}>
        <div style={{fontSize:9,color:c.fa,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>↓ Saídas</div>
        <div style={{fontSize:13,fontWeight:700,color:c.re}}>{fBRL(saidas)}</div>
      </div>
    </div>
    {entradas>0&&<div style={{marginTop:16}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontSize:10,color:c.fa}}>Comprometido</span>
        <span style={{fontSize:10,fontWeight:700,color:pct>80?c.re:pct>60?c.ye:c.gr}}>{pct}%</span>
      </div>
      <div style={{height:6,background:c.bd,borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",borderRadius:3,transition:"width 0.6s",
          background:pct>80?"linear-gradient(90deg,"+c.ye+","+c.re+")":pct>60?c.ye:c.gr}}/>
      </div>
    </div>}
  </div>;
}

function UserPicker({onPick}){
  const [name,setName]=useState("");
  const [users]=useState(()=>stor.users());
  const pick=u=>{stor.addU(u);onPick(u);};
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d0f14",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
    <div style={{background:"#161921",border:"1px solid #1f2333",borderRadius:24,padding:"40px 44px",width:400,boxShadow:"0 8px 40px rgba(0,0,0,0.4)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:36,marginBottom:10}}>💰</div>
        <div style={{fontSize:20,fontWeight:800,color:"#e8eaf0",letterSpacing:2}}>FINANÇAS 2026</div>
        <div style={{fontSize:12,color:"#4a5168",marginTop:6}}>Quem está acessando?</div>
      </div>
      {users.length>0&&<>
        <div style={{fontSize:11,color:"#4a5168",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontWeight:600}}>Perfis existentes</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {users.map(u=><button key={u} onClick={()=>pick(u)}
            style={{background:"#1f2333",border:"1px solid #2e3347",borderRadius:12,padding:"12px 16px",
              color:"#e8eaf0",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"left",
              transition:"all 0.15s",display:"flex",alignItems:"center",gap:10,fontFamily:"'Plus Jakarta Sans',sans-serif"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#4ade80";e.currentTarget.style.color="#4ade80";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#2e3347";e.currentTarget.style.color="#e8eaf0";}}>
            <span style={{fontSize:18}}>👤</span> {u}
          </button>)}
        </div>
        <div style={{height:1,background:"#1f2333",marginBottom:20}}/>
      </>}
      <div style={{fontSize:11,color:"#4a5168",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10,fontWeight:600}}>
        {users.length>0?"Novo perfil":"Criar perfil"}
      </div>
      <div style={{display:"flex",gap:8}}>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&name.trim())pick(name.trim());}}
          placeholder="Seu nome ou apelido"
          style={{flex:1,background:"#1f2333",border:"1px solid #2e3347",borderRadius:10,
            padding:"10px 14px",color:"#e8eaf0",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,outline:"none"}}/>
        <button onClick={()=>name.trim()&&pick(name.trim())}
          style={{background:"#4ade80",color:"#0d0f14",border:"none",borderRadius:10,padding:"0 18px",
            fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"'Plus Jakarta Sans',sans-serif",whiteSpace:"nowrap"}}>Entrar</button>
      </div>
    </div>
  </div>;
}

function App(){
  const [user,setUser]=useState(null);
  const [dark,setDark]=useState(true);
  const [txs,setTxs]=useState([]);
  const [iCats,setICats]=useState(["Salário","Freelance","Dividendos"]);
  const [oCats,setOCats]=useState(["Moradia","Alimentação","Lazer"]);
  const [tab,setTab]=useState("2026-03");
  const [filt,setFilt]=useState("todos");
  const [yM,setYM]=useState(null);

  useEffect(()=>{
    if(!user)return;
    const saved=stor.ld(user,"txs",null);
    setTxs(saved!==null?saved:SEED);
    setICats(stor.ld(user,"iCats",["Salário","Freelance","Dividendos"]));
    setOCats(stor.ld(user,"oCats",["Moradia","Alimentação","Lazer"]));
    setDark(stor.ld(user,"dark",true));
  },[user]);

  useEffect(()=>{if(user)stor.sv(user,"txs",txs);},[txs,user]);
  useEffect(()=>{if(user)stor.sv(user,"iCats",iCats);},[iCats,user]);
  useEffect(()=>{if(user)stor.sv(user,"oCats",oCats);},[oCats,user]);
  useEffect(()=>{if(user)stor.sv(user,"dark",dark);},[dark,user]);

  if(!user)return <UserPicker onPick={setUser}/>;

  const c=dark?DK:LT;
  const cc=dark?CDK:CLT;
  const isYear=tab==="year";
  const mTxs=txs.filter(t=>t.date.startsWith(tab));
  const fTxs=filt==="todos"?mTxs:mTxs.filter(t=>t.type===filt);
  const yS=cst(txs);

  const upd=(id,p)=>setTxs(a=>a.map(t=>t.id===id?{...t,...p}:t));
  const del=(id)=>setTxs(a=>a.filter(t=>t.id!==id));
  const add=(t)=>setTxs(a=>[{id:Date.now(),...t},...a]);

  const yData=MK.map((k,i)=>{const s=cst(txs.filter(t=>t.date.startsWith(k)));return{mes:MN[i],...s,key:k};});
  const card={background:c.sur,border:"1px solid "+c.bd,borderRadius:20,padding:"24px",boxShadow:c.sh};
  const tip={background:c.cb,border:"1px solid "+c.bd,borderRadius:10,color:c.tx,fontSize:12,boxShadow:c.sh};
  const pD=Object.entries(mTxs.filter(t=>t.amount<0).reduce((a,t)=>{a[t.category]=(a[t.category]||0)+Math.abs(t.amount);return a;},{})).map(([n,v])=>({name:n,value:v}));

  // Filter txs per panel
  const inTxs=mTxs.filter(t=>t.amount>0&&iCats.includes(t.category));
  const outTxs=mTxs.filter(t=>t.amount<0&&oCats.includes(t.category));

  return <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",background:c.bg,minHeight:"100vh",color:c.tx,transition:"background 0.3s,color 0.3s"}}>
    <style>{`
      .txr:hover{background:${c.hov}}
      input:focus,select:focus{border-color:${c.gr}!important;outline:none!important}
      input,select{font-family:'Plus Jakarta Sans',sans-serif;}
    `}</style>

    {/* NAV */}
    <div style={{borderBottom:"1px solid "+c.bd,background:dark?"rgba(22,25,33,0.95)":c.sur,
      position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
      <div style={{maxWidth:1080,margin:"0 auto",padding:"0 24px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,
            background:dark?"linear-gradient(135deg,#4ade80,#22d3ee)":"linear-gradient(135deg,#16a34a,#0891b2)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>💰</div>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:c.tx,letterSpacing:2,textTransform:"uppercase",lineHeight:1}}>FINANÇAS 2026</div>
            <div style={{fontSize:10,color:c.fa,marginTop:2}}>👤 {user}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <button onClick={()=>setDark(v=>!v)}
            style={{display:"flex",alignItems:"center",gap:8,background:c.alt,border:"1px solid "+c.bd,
              borderRadius:20,padding:"6px 14px",cursor:"pointer",transition:"all 0.2s",color:c.tx,fontSize:12,fontWeight:600,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
            <span style={{fontSize:14}}>{dark?"☀️":"🌙"}</span>{dark?"Tema Claro":"Tema Escuro"}
          </button>
          <button onClick={()=>setUser(null)}
            style={{background:"none",border:"1px solid "+c.bd,borderRadius:20,padding:"6px 12px",
              color:c.fa,fontSize:11,cursor:"pointer",fontWeight:600,transition:"all 0.15s",fontFamily:"'Plus Jakarta Sans',sans-serif"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=c.re;e.currentTarget.style.color=c.re;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=c.bd;e.currentTarget.style.color=c.fa;}}>
            Trocar perfil
          </button>
        </div>
      </div>
    </div>

    <div style={{maxWidth:1080,margin:"0 auto",padding:"28px 24px"}}>
      {/* MONTH TABS */}
      <div style={{overflowX:"auto",marginBottom:28,paddingBottom:2}}>
        <div style={{background:c.sur,border:"1px solid "+c.bd,borderRadius:14,padding:"5px",
          display:"inline-flex",gap:3,minWidth:"max-content",boxShadow:c.sh}}>
          {MK.map((k,i)=>{
            const has=txs.some(t=>t.date.startsWith(k));
            const on=tab===k;
            return <button key={k} onClick={()=>{setTab(k);setFilt("todos");}}
              style={{padding:"7px 14px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",border:"none",
                transition:"all 0.18s",fontFamily:"'Plus Jakarta Sans',sans-serif",whiteSpace:"nowrap",
                background:on?c.ton:"transparent",color:on?c.tof:has?c.tx:c.fa}}>
              {MN[i]}{has&&!on&&<span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:c.gr,marginLeft:5,verticalAlign:"middle"}}/>}
            </button>;
          })}
          <div style={{width:1,background:c.bd,margin:"4px 4px"}}/>
          <button onClick={()=>{setTab("year");setYM(null);}}
            style={{padding:"7px 16px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer",border:"none",
              transition:"all 0.18s",fontFamily:"'Plus Jakarta Sans',sans-serif",whiteSpace:"nowrap",
              background:tab==="year"?c.ye:"transparent",color:tab==="year"?(dark?"#0d0f14":"#fff"):c.ye}}>
            Ano Total ★
          </button>
        </div>
      </div>

      {/* MONTH VIEW */}
      {!isYear&&<div className="fade" key={tab}>
        {/* Top row: saldo + entradas + saidas */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:18,marginBottom:28}}>
          <SaldoCard mTxs={mTxs} c={c} dark={dark}/>
          <TabPanel title="↑ ENTRADAS" color={c.gr} colorBg={c.grb} colorBd={c.grd}
            txs={inTxs} mKey={tab} onUpdate={upd} onRemove={del} onAdd={add}
            c={c} dark={dark} cats={iCats} setCats={setICats}/>
          <TabPanel title="↓ SAÍDAS" color={c.re} colorBg={c.reb} colorBd={c.red}
            txs={outTxs} mKey={tab} onUpdate={upd} onRemove={del} onAdd={add}
            c={c} dark={dark} cats={oCats} setCats={setOCats} defaultCat="Moradia"/>
        </div>

        {/* Charts */}
        {mTxs.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1.4fr",gap:18,marginBottom:28}}>
          <div style={card}>
            <div style={{fontSize:12,fontWeight:700,color:c.mu,marginBottom:2}}>Gastos por Categoria</div>
            <div style={{fontSize:11,color:c.fa,marginBottom:14}}>Distribuição das saídas</div>
            {pD.length>0?<>
              <ResponsiveContainer width="100%" height={160}>
                <PieChart>
                  <Pie data={pD} cx="50%" cy="50%" innerRadius={46} outerRadius={70} paddingAngle={3} dataKey="value">
                    {pD.map((_,i)=><Cell key={i} fill={cc[i%cc.length]}/>)}
                  </Pie>
                  <Tooltip formatter={v=>fBRL(v)} contentStyle={tip}/>
                </PieChart>
              </ResponsiveContainer>
              <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:8}}>
                {pD.map((d,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:8,height:8,borderRadius:2,background:cc[i%cc.length],flexShrink:0}}/>
                    <span style={{fontSize:11,color:c.mu}}>{d.name}</span>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:c.tx}}>{fBRL(d.value)}</span>
                </div>)}
              </div>
            </>:<div style={{textAlign:"center",color:c.fa,padding:"40px 0",fontSize:13}}>Sem saídas este mês</div>}
          </div>
          <div style={card}>
            <div style={{fontSize:12,fontWeight:700,color:c.mu,marginBottom:2}}>Resumo do Mês</div>
            <div style={{fontSize:11,color:c.fa,marginBottom:14}}>Entradas vs Saídas — {MN[MK.indexOf(tab)]}</div>
            <ResponsiveContainer width="100%" height={215}>
              <BarChart data={[{name:"Mês",...cst(mTxs)}]} barCategoryGap="40%">
                <CartesianGrid strokeDasharray="3 3" stroke={c.cg} vertical={false}/>
                <XAxis dataKey="name" stroke={c.ct} tick={{fontSize:11,fill:c.ct}} axisLine={false} tickLine={false}/>
                <YAxis stroke={c.ct} tick={{fontSize:10,fill:c.ct}} tickFormatter={v=>"R$"+v/1000+"k"} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>fBRL(v)} contentStyle={tip}/>
                <Bar dataKey="entradas" fill={c.gr} radius={[8,8,0,0]} name="Entradas" maxBarSize={60}/>
                <Bar dataKey="saidas" fill={c.re} radius={[8,8,0,0]} name="Saídas" maxBarSize={60}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>}

        {/* Transaction list */}
        <div style={card}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:c.tx}}>
                Transações
                <span style={{marginLeft:8,background:c.alt,border:"1px solid "+c.bd,padding:"2px 8px",borderRadius:20,fontSize:11,color:c.fa,fontWeight:500}}>{mTxs.length}</span>
              </div>
              <div style={{fontSize:11,color:c.fa,marginTop:2}}>{MN[MK.indexOf(tab)]} 2026</div>
            </div>
            <div style={{display:"flex",gap:5}}>
              {["todos","entrada","saída"].map(f=><button key={f} onClick={()=>setFilt(f)}
                style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:"1px solid",
                  transition:"all 0.15s",fontFamily:"'Plus Jakarta Sans',sans-serif",
                  background:filt===f?c.ton:"transparent",color:filt===f?c.tof:c.fa,borderColor:filt===f?c.ton:c.bd}}>
                {f.charAt(0).toUpperCase()+f.slice(1)}
              </button>)}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            {fTxs.map(tx=><div key={tx.id} className="txr"
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0}}>
                <div style={{width:34,height:34,borderRadius:10,flexShrink:0,
                  background:tx.amount>0?c.grb:c.reb,border:"1px solid "+(tx.amount>0?c.grd:c.red),
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:tx.amount>0?c.gr:c.re,fontWeight:700}}>
                  {tx.amount>0?"↑":"↓"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:c.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.desc}</div>
                  <div style={{fontSize:11,color:c.fa,marginTop:1}}>{tx.category} · {new Date(tx.date+"T12:00").toLocaleDateString("pt-BR")}</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                <span style={{fontSize:14,fontWeight:700,color:tx.amount>0?c.gr:c.re}}>
                  {tx.amount>0?"+":""}{fBRL(tx.amount)}
                </span>
                <button onClick={()=>del(tx.id)}
                  style={{background:"none",border:"none",color:c.bd,cursor:"pointer",fontSize:14,transition:"color 0.15s",padding:"2px 4px"}}
                  onMouseEnter={e=>e.currentTarget.style.color=c.re}
                  onMouseLeave={e=>e.currentTarget.style.color=c.bd}>✕</button>
              </div>
            </div>)}
            {fTxs.length===0&&<div style={{textAlign:"center",color:c.fa,padding:"32px 0",fontSize:13}}>
              Nenhuma transação em {MN[MK.indexOf(tab)]}
            </div>}
          </div>
        </div>
      </div>}

      {/* YEAR VIEW */}
      {isYear&&<div className="fade">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:18,marginBottom:24}}>
          {[
            {l:"Saldo Anual",v:yS.saldo,col:yS.saldo>=0?c.gr:c.re,bg:yS.saldo>=0?c.grb:c.reb,bd:yS.saldo>=0?c.grd:c.red},
            {l:"Total Entradas",v:yS.entradas,col:c.gr,bg:c.grb,bd:c.grd},
            {l:"Total Saídas",v:yS.saidas,col:c.re,bg:c.reb,bd:c.red},
          ].map((x,i)=><div key={i} style={{...card,background:x.bg,border:"1px solid "+x.bd}}>
            <div style={{fontSize:10,color:c.fa,textTransform:"uppercase",letterSpacing:2,marginBottom:10,fontWeight:600}}>{x.l}</div>
            <div style={{fontSize:28,fontWeight:700,color:x.col}}>{fBRL(x.v)}</div>
          </div>)}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:24}}>
          <div style={card}>
            <div style={{fontSize:12,fontWeight:700,color:c.mu,marginBottom:2}}>Evolução do Saldo</div>
            <div style={{fontSize:11,color:c.fa,marginBottom:14}}>Saldo mensal 2026</div>
            <ResponsiveContainer width="100%" height={190}>
              <LineChart data={yData}>
                <CartesianGrid strokeDasharray="3 3" stroke={c.cg} vertical={false}/>
                <XAxis dataKey="mes" stroke={c.ct} tick={{fontSize:10,fill:c.ct}} axisLine={false} tickLine={false}/>
                <YAxis stroke={c.ct} tick={{fontSize:9,fill:c.ct}} tickFormatter={v=>"R$"+v/1000+"k"} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>fBRL(v)} contentStyle={tip}/>
                <Line type="monotone" dataKey="saldo" stroke={c.gr} strokeWidth={2.5} dot={{fill:c.gr,r:3,strokeWidth:0}} activeDot={{r:5}} name="Saldo"/>
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div style={card}>
            <div style={{fontSize:12,fontWeight:700,color:c.mu,marginBottom:2}}>Entradas vs Saídas por Mês</div>
            <div style={{fontSize:11,color:c.fa,marginBottom:14}}>Comparativo 2026</div>
            <ResponsiveContainer width="100%" height={190}>
              <BarChart data={yData} barGap={3} barCategoryGap="30%">
                <CartesianGrid strokeDasharray="3 3" stroke={c.cg} vertical={false}/>
                <XAxis dataKey="mes" stroke={c.ct} tick={{fontSize:10,fill:c.ct}} axisLine={false} tickLine={false}/>
                <YAxis stroke={c.ct} tick={{fontSize:9,fill:c.ct}} tickFormatter={v=>v/1000+"k"} axisLine={false} tickLine={false}/>
                <Tooltip formatter={v=>fBRL(v)} contentStyle={tip}/>
                <Legend wrapperStyle={{fontSize:11,color:c.mu}}/>
                <Bar dataKey="entradas" fill={c.gr} radius={[4,4,0,0]} name="Entradas" maxBarSize={22}/>
                <Bar dataKey="saidas" fill={c.re} radius={[4,4,0,0]} name="Saídas" maxBarSize={22}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Month tabs breakdown */}
        <div style={card}>
          <div style={{fontSize:12,fontWeight:700,color:c.mu,marginBottom:2}}>Detalhamento por Mês</div>
          <div style={{fontSize:11,color:c.fa,marginBottom:18}}>Selecione um mês para expandir</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:20,padding:"6px",background:c.alt,borderRadius:14,border:"1px solid "+c.bd}}>
            {yData.map(row=>{
              const has=txs.some(t=>t.date.startsWith(row.key));
              const on=yM===row.key;
              const ms=cst(txs.filter(t=>t.date.startsWith(row.key)));
              return <button key={row.key} onClick={()=>setYM(on?null:row.key)}
                style={{padding:"6px 13px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",border:"1px solid",
                  transition:"all 0.18s",fontFamily:"'Plus Jakarta Sans',sans-serif",
                  background:on?c.ton:"transparent",color:on?c.tof:has?c.tx:c.fa,borderColor:on?c.ton:has?c.bd2:c.bd}}>
                {row.mes}{has&&!on&&<span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",
                  background:ms.saldo>=0?c.gr:c.re,marginLeft:4,verticalAlign:"middle"}}/>}
              </button>;
            })}
          </div>

          {yM?(()=>{
            const mt=txs.filter(t=>t.date.startsWith(yM));
            const ms=cst(mt);
            const mi=MK.indexOf(yM);
            return <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:18}}>
                {[
                  {l:"Saldo",v:ms.saldo,col:ms.saldo>=0?c.gr:c.re},
                  {l:"Entradas",v:ms.entradas,col:c.gr},
                  {l:"Saídas",v:ms.saidas,col:c.re},
                ].map((x,i)=><div key={i} style={{background:c.alt,borderRadius:12,padding:"12px 16px",border:"1px solid "+c.bd}}>
                  <div style={{fontSize:9,color:c.fa,textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:600}}>{x.l} — {MN[mi]}</div>
                  <div style={{fontSize:20,fontWeight:700,color:x.col}}>{fBRL(x.v)}</div>
                </div>)}
              </div>
              {mt.length===0?<div style={{textAlign:"center",color:c.fa,padding:"28px 0",fontSize:13}}>Nenhuma transação em {MN[mi]}</div>:
                <div style={{display:"flex",flexDirection:"column",gap:2,maxHeight:320,overflowY:"auto"}}>
                  {mt.map(tx=><div key={tx.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"9px 12px",borderRadius:10,background:c.alt,border:"1px solid "+c.bd,marginBottom:2}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>
                      <div style={{width:28,height:28,borderRadius:8,flexShrink:0,
                        background:tx.amount>0?c.grb:c.reb,border:"1px solid "+(tx.amount>0?c.grd:c.red),
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:tx.amount>0?c.gr:c.re,fontWeight:700}}>
                        {tx.amount>0?"↑":"↓"}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,color:c.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.desc}</div>
                        <div style={{fontSize:10,color:c.fa}}>{tx.category}</div>
                      </div>
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:tx.amount>0?c.gr:c.re,flexShrink:0}}>
                      {tx.amount>0?"+":""}{fBRL(tx.amount)}
                    </span>
                  </div>)}
                </div>
              }
              <div style={{marginTop:14,textAlign:"center"}}>
                <button onClick={()=>setTab(yM)}
                  style={{background:c.alt,border:"1px solid "+c.bd,borderRadius:10,padding:"8px 18px",
                    color:c.mu,fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"'Plus Jakarta Sans',sans-serif",transition:"all 0.15s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=c.gr;e.currentTarget.style.color=c.gr;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=c.bd;e.currentTarget.style.color=c.mu;}}>
                  Ir para {MN[mi]} para editar →
                </button>
              </div>
            </div>;
          })():(
            <div style={{borderRadius:12,overflow:"hidden",border:"1px solid "+c.bd}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 70px",background:c.alt}}>
                {["Mês","Entradas","Saídas","Saldo",""].map((h,i)=><div key={i}
                  style={{fontSize:10,color:c.fa,textTransform:"uppercase",letterSpacing:1.5,padding:"10px 14px",fontWeight:700,borderBottom:"1px solid "+c.bd}}>{h}</div>)}
              </div>
              {yData.map((row,i)=>{
                const has=txs.some(t=>t.date.startsWith(row.key));
                return [
                  <div key={"m"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,fontWeight:600,color:has?c.tx:c.fa,background:c.sur}}>{row.mes}</div>,
                  <div key={"e"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,fontWeight:600,color:c.gr,background:c.sur}}>{has?fBRL(row.entradas):"—"}</div>,
                  <div key={"s"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,fontWeight:600,color:c.re,background:c.sur}}>{has?fBRL(row.saidas):"—"}</div>,
                  <div key={"sl"+i} style={{padding:"11px 14px",borderBottom:"1px solid "+c.bd,fontSize:13,fontWeight:700,color:row.saldo>=0?c.gr:c.re,background:c.sur}}>{has?fBRL(row.saldo):"—"}</div>,
                  <div key={"b"+i} style={{padding:"9px 14px",borderBottom:"1px solid "+c.bd,background:c.sur}}>
                    <button onClick={()=>setYM(row.key)}
                      style={{background:c.alt,border:"1px solid "+c.bd,color:c.mu,borderRadius:8,padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",transition:"all 0.15s"}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor=c.gr;e.currentTarget.style.color=c.gr;}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor=c.bd;e.currentTarget.style.color=c.mu;}}>ver</button>
                  </div>,
                ];
              })}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 70px",background:dark?"#1a2440":"#eef4ff",borderTop:"2px solid "+c.bd2}}>
                {["Total 2026",fBRL(yS.entradas),fBRL(yS.saidas),fBRL(yS.saldo),""].map((v,i)=><div key={i}
                  style={{padding:"13px 14px",fontSize:14,fontWeight:700,
                    color:i===0?c.ye:i===1?c.gr:i===2?c.re:yS.saldo>=0?c.gr:c.re}}>{v}</div>)}
              </div>
            </div>
          )}
        </div>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
